version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    environment:
      KNOWLEDGE_BASE_PATH: /app/data/knowledge_base
      HR_DATABASE_PATH: /app/data/hr.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
